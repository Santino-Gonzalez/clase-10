<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Simón Dice</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style type="text/css">
        body{
            user-zoom: 80%;
        }

        button{
            height: 58px;
            width: 116px;
        }


        #blue{
            width: 300px;
            height: 400px;
            border-radius: 200px 260px;
            border-right: 80px solid transparent;
            border-left: 70px solid transparent;
            border-top: 100px solid blue;
            transform: rotate(110deg);
            position: absolute;
        }

        #green{
            width: 300px;
            height: 400px;
            border-radius: 200px 260px;
            border-right: 80px solid transparent;
            border-left: 70px solid transparent;
            border-top: 100px solid green;
            transform: rotate(20deg);
            position: absolute;
        }

        #yellow{
            width: 300px;
            height: 400px;
            border-radius: 200px 260px;
            border-right: 80px solid transparent;
            border-left: 70px solid transparent;
            border-top: 100px solid yellow;
            transform: rotate(-70deg);
            position: absolute;
        }

        #red{
            width: 300px;
            height: 400px;
            border-radius: 200px 260px;
            border-right: 80px solid transparent;
            border-left: 70px solid transparent;
            border-top: 100px solid red;
            transform: rotate(-160deg);
            position: absolute;
        }

        .color{
            left: 75px;
            bottom: 25px;
            opacity: 0.5;
            transition: 500ms;
        }

        #basis-of-the-game{
            border-radius: 300px;
            width: 450px;
            height: 450px;
            background-color: black;
            position: absolute;
            right: 525px;
            bottom: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
          <div class="col-sm-7">
            <div id="status" class="alert alert-primary">Oprima "Empezar" para iniciar el juego.</div>
          </div>
          <div class="col">
            <div id="rounds" class="alert alert-info">Ronda Nº-</div>
          </div>
          <div class="col">
            <button id="start-button" type="button" class="btn btn-primary">Empezar</button>
          </div>
        </div>
    </div>
    
    <div class="container">
        <div id="basis-of-the-game">
            <div class="color" id="blue"></div>
            <div class="color" id="green"></div>
            <div class="color" id="yellow"></div>
            <div class="color" id="red"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
